apiVersion: v1
kind: Service
metadata:
  name: gateway
spec:
  selector: { app: gateway }
  ports:
  - name: http
    port: 8000
    targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
spec:
  replicas: 1
  selector: { matchLabels: { app: gateway } }
  template:
    metadata:
      labels: { app: gateway }
    spec:
      containers:
      - name: app
        image: zt-demo-fastapi:1.0
        imagePullPolicy: IfNotPresent
        env:
        - { name: SERVICE_NAME, value: "gateway" }
        - { name: USERS_URL, value: "http://users:8000" }
        - { name: PAY_URL, value: "http://pay:8000" }
        - { name: EXP_ID, value: "exp-insecure-001" }
        ports:
        - containerPort: 8000
